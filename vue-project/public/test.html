<!DOCTYPE html>
<html>
<head>
    <title>Connection Test</title>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</head>
<body>
    <h1>API Connection Test</h1>
    <button onclick="testConnection()">Test API Connection</button>
    <div id="result"></div>

    <script>
        async function testConnection() {
            const resultDiv = document.getElementById('result');
            resultDiv.innerHTML = '<p>Testing connection...</p>';
            
            try {
                const response = await axios.get('http://localhost:3000/api/auth/me');
                resultDiv.innerHTML = '<p style="color: green;">✓ Connection successful!</p>';
                resultDiv.innerHTML += '<pre>' + JSON.stringify(response.data, null, 2) + '</pre>';
            } catch (error) {
                if (error.response) {
                    // Server responded with error status
                    resultDiv.innerHTML = '<p style="color: orange;">⚠ Server responded but with error:</p>';
                    resultDiv.innerHTML += '<pre>' + JSON.stringify(error.response.data, null, 2) + '</pre>';
                } else if (error.request) {
                    // Request was made but no response received
                    resultDiv.innerHTML = '<p style="color: red;">❌ No response from server. Error:</p>';
                    resultDiv.innerHTML += '<pre>' + error.message + '</pre>';
                    resultDiv.innerHTML += '<p>Possible causes:</p>';
                    resultDiv.innerHTML += '<ul><li>Backend server not running</li><li>CORS issues</li><li>Network/firewall blocking</li></ul>';
                } else {
                    // Something else happened
                    resultDiv.innerHTML = '<p style="color: red;">❌ Error setting up request:</p>';
                    resultDiv.innerHTML += '<pre>' + error.message + '</pre>';
                }
            }
        }
    </script>
</body>
</html>
